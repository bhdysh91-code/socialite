{% extends "base.html" %}

{% block title %}القصص{% endblock %}

{% block content %}
<div style="padding:12px;">
    <div style="background:#1A1A2E;border-radius:12px;padding:20px;border:1px solid #2D2D44;text-align:center;">
        <h2 style="margin-bottom:16px;">📸 القصص</h2>
        <div style="display:flex;gap:16px;overflow-x:auto;padding:12px 0;scrollbar-width:none;">
            <div style="min-width:80px;text-align:center;cursor:pointer;" onclick="showToast('📸 إضافة قصة جديدة')">
                <div style="width:70px;height:70px;border-radius:50%;border:2px dashed #8B5CF6;display:flex;align-items:center;justify-content:center;font-size:28px;color:#8B5CF6;margin:0 auto;">+</div>
                <div style="font-size:12px;color:#A0A0B0;margin-top:4px;">أضف قصة</div>
            </div>
            {% for i in range(5) %}
            <div style="min-width:80px;text-align:center;cursor:pointer;" onclick="showToast('📸 عرض القصة')">
                <div style="width:70px;height:70px;border-radius:50%;padding:3px;background:linear-gradient(135deg,#8B5CF6,#EC4899);margin:0 auto;">
                    <img src="https://i.pravatar.cc/150?img={{ i+5 }}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid #1A1A2E;">
                </div>
                <div style="font-size:12px;color:#A0A0B0;margin-top:4px;">مستخدم {{ i+1 }}</div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
